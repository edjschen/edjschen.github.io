<!DOCTYPE HTML>
<html>
<head>
	<title>ed’s movie</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

	<style>
	/* show header */
	#header {
		display: block !important;
		padding-top: 20px;
		text-align: center;
	}

	#header h1 {
		font-size: 36px;
		color: #fff;
		margin-bottom: 10px;
	}

	/* filter bar */
	#filters {
	    text-align: center;
	    margin: 10px 0 20px 0;
	    position: relative;
	    z-index: 10;
	}
	#filters input {
	    margin: 5px;
	    padding: 8px 12px;
	    border-radius: 4px;
	    border: 1px solid #888;
	    background: rgba(255, 255, 255, 0.15) !important;
	    color: #fff !important;
	    font-size: 14px;
	    outline: none;
	    display: inline-block !important;
	    visibility: visible !important;
	    opacity: 1 !important;
	}
	#filters input::placeholder {
	    color: rgba(255, 255, 255, 0.6);
	}
	#filters input:focus {
	    border-color: #fff;
	    background: rgba(255, 255, 255, 0.25) !important;
	}

	/* text inside image */
	.thumb h2 {
		position: absolute;
		bottom: 30px;
		left: 10px;
		color: white;
		text-shadow: 0 0 6px black;
		font-size: 18px;
	}
	.thumb p {
		position: absolute;
		bottom: 10px;
		left: 10px;
		color: white;
		text-shadow: 0 0 6px black;
		font-size: 14px;
	}
	</style>
</head>

<body class="is-preload">

<div id="wrapper">

	<!-- Header -->
	<header id="header">
		<h1>ed’s movie</h1>
		<div id="filters">
			<input type="text" id="filter-name" placeholder="Name">
			<input type="number" id="filter-year" placeholder="Year">
			<input type="number" id="filter-rate" placeholder="Rate (1-10)">
		</div>
	</header>

	<!-- Main -->
	<div id="main">

		<article class="thumb" data-name="Talk to Her" data-year="2001" data-rate="8">
			<div class="image"><img src="images/thumbs/01.jpg" alt="" /></div>
			<h2>Talk to Her</h2>
			<p>2001 | Rate: 8</p>
		</article>

		<article class="thumb" data-name="project2" data-year="2022" data-rate="6">
			<div class="image"><img src="images/thumbs/02.jpg" alt="" /></div>
			<h2>Project 2</h2>
			<p>2022 | Rate: 6</p>
		</article>

		<article class="thumb" data-name="project3" data-year="2024" data-rate="9">
			<div class="image"><img src="images/thumbs/03.jpg" alt="" /></div>
			<h2>Project 3</h2>
			<p>2024 | Rate: 9</p>
		</article>

	</div>

</div>

<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>
<script src="assets/js/main.js"></script>

<script>
const nameInput = document.getElementById('filter-name');
const yearInput = document.getElementById('filter-year');
const rateInput = document.getElementById('filter-rate');
const items = document.querySelectorAll('.thumb');

function filter() {
	const name = nameInput.value.toLowerCase();
	const year = yearInput.value;
	const rate = rateInput.value;

	items.forEach(item => {
		const n = item.dataset.name.toLowerCase();
		const y = item.dataset.year;
		const r = item.dataset.rate;
		let show = true;
		if (name && !n.includes(name)) show = false;
		if (year && y !== year) show = false;
		if (rate && r < rate) show = false;
		item.style.display = show ? '' : 'none';
	});
}

nameInput.addEventListener('input', filter);
yearInput.addEventListener('input', filter);
rateInput.addEventListener('input', filter);
</script>

</body>
</html>
