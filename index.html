<!DOCTYPE HTML>
<html>
<head>
  <title>ed’s movie</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    /* Title */
    .title {
      text-align: center;
      font-size: 48px;
      font-weight: bold;
      padding: 40px 0 20px 0;
    }

    /* Filter bar */
    .filter-bar {
      text-align: center;
      padding: 20px;
    }

    .filter-bar input {
      margin: 5px;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }

    /* Grid */
    #main {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 0;
    }

    /* Blocks */
    .thumb {
      background: #1c1c1c;
      border: 1px solid #333;
      padding: 10px;
    }

    .thumb img {
      width: 100%;
      display: block;
    }

    .thumb h2 {
      margin: 10px 0 5px;
    }

    .thumb p {
      margin: 5px 0;
      font-size: 14px;
      color: #ccc;
    }
  </style>
</head>

<body>

<div class="title">ed’s movie</div>

<div class="filter-bar">
  <input type="text" id="filter-name" placeholder="Name">
  <input type="number" id="filter-year" placeholder="Year">
  <input type="number" id="filter-rate" placeholder="Min Rate (1-10)">
</div>

<div id="main">

  <div class="thumb" data-name="project1" data-year="2023" data-rate="8">
    <img src="images/thumbs/01.jpg">
    <h2>Project 1</h2>
    <p>Year: 2023</p>
    <p>Rate: 8</p>
  </div>

  <div class="thumb" data-name="project2" data-year="2022" data-rate="6">
    <img src="images/thumbs/02.jpg">
    <h2>Project 2</h2>
    <p>Year: 2022</p>
    <p>Rate: 6</p>
  </div>

  <div class="thumb" data-name="project3" data-year="2023" data-rate="9">
    <img src="images/thumbs/03.jpg">
    <h2>Project 3</h2>
    <p>Year: 2023</p>
    <p>Rate: 9</p>
  </div>

</div>

<script>
const nameInput = document.getElementById('filter-name');
const yearInput = document.getElementById('filter-year');
const rateInput = document.getElementById('filter-rate');

const items = document.querySelectorAll('.thumb');

function filter() {
  const name = nameInput.value.toLowerCase();
  const year = yearInput.value;
  const rate = rateInput.value;

  items.forEach(item => {
    const itemName = item.dataset.name.toLowerCase();
    const itemYear = item.dataset.year;
    const itemRate = item.dataset.rate;

    let show = true;

    if (name && !itemName.includes(name)) show = false;
    if (year && itemYear !== year) show = false;
    if (rate && itemRate < rate) show = false;

    item.style.display = show ? 'block' : 'none';
  });
}

nameInput.addEventListener('input', filter);
yearInput.addEventListener('input', filter);
rateInput.addEventListener('input', filter);
</script>

</body>
</html>
