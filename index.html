<!DOCTYPE HTML>
<html>
<head>
	<title>ed’s movie</title>
	<meta charset="utf-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
	<link rel="stylesheet" href="assets/css/main.css" />
	<noscript><link rel="stylesheet" href="assets/css/noscript.css" /></noscript>

	<style>
	/* Filter */

	#header {
		display: block !important;
	}
	
	#header h1 {
	  font-size: 40px;
	  text-align: center;
	}
	
	#filters {
	  text-align: center;
	  margin-top: 10px;
	}
	
	#filters input {
	  padding: 8px;
	  margin: 5px;
	}
	#filters {
		padding: 10px 20px;
		text-align: center;
	}
	#filters input {
		margin: 5px;
		padding: 8px;
	}

	/* Text inside image */
	.thumb {
		position: relative;
	}

	.thumb h2 {
		position: absolute;
		bottom: 35px;
		left: 10px;
		color: white;
		text-shadow: 0 0 5px black;
		font-size: 18px;
	}

	.thumb p {
		position: absolute;
		bottom: 10px;
		left: 10px;
		color: white;
		text-shadow: 0 0 5px black;
		font-size: 14px;
	}
	</style>
</head>

<body class="is-preload">

<div id="wrapper">

	<!-- Header -->
	<header id="header">
		<h1><strong>ed’s movie</strong></h1>

		<div id="filters">
			<input type="text" id="filter-name" placeholder="Name">
			<input type="number" id="filter-year" placeholder="Year">
			<input type="number" id="filter-rate" placeholder="Rate (1-10)">
		</div>
	</header>

	<!-- Main -->
	<div id="main">

		<article class="thumb" data-name="project1" data-year="2023" data-rate="8">
			<div class="image">
				<img src="images/thumbs/01.jpg" alt="" />
			</div>
			<h2>Project 1</h2>
			<p>2023 | Rate: 8</p>
		</article>

		<article class="thumb" data-name="project2" data-year="2022" data-rate="6">
			<div class="image">
				<img src="images/thumbs/02.jpg" alt="" />
			</div>
			<h2>Project 2</h2>
			<p>2022 | Rate: 6</p>
		</article>

		<article class="thumb" data-name="project3" data-year="2024" data-rate="9">
			<div class="image">
				<img src="images/thumbs/03.jpg" alt="" />
			</div>
			<h2>Project 3</h2>
			<p>2024 | Rate: 9</p>
		</article>

	</div>

</div>

<!-- Scripts -->
<script src="assets/js/jquery.min.js"></script>
<script src="assets/js/browser.min.js"></script>
<script src="assets/js/breakpoints.min.js"></script>
<script src="assets/js/util.js"></script>
<script src="assets/js/main.js"></script>

<script>
const nameInput = document.getElementById('filter-name');
const yearInput = document.getElementById('filter-year');
const rateInput = document.getElementById('filter-rate');

const items = document.querySelectorAll('.thumb');

function filter() {
	const name = nameInput.value.toLowerCase();
	const year = yearInput.value;
	const rate = rateInput.value;

	items.forEach(item => {
		const itemName = item.dataset.name.toLowerCase();
		const itemYear = item.dataset.year;
		const itemRate = item.dataset.rate;

		let show = true;

		if (name && !itemName.includes(name)) show = false;
		if (year && itemYear !== year) show = false;
		if (rate && itemRate < rate) show = false;

		item.style.display = show ? '' : 'none';
	});
}

nameInput.addEventListener('input', filter);
yearInput.addEventListener('input', filter);
rateInput.addEventListener('input', filter);
</script>

</body>
</html>
